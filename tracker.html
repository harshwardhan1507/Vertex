<style>

        color: var(--color-text-secondary);
        margin-top: 1px;
    }

    .summary-cards {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 1.5rem;
    }

    .summary-card {
        background: var(--color-background-secondary);
        border-radius: var(--border-radius-md);
        padding: 12px 14px;
    }

    .summary-label {
        font-size: 12px;
        color: var(--color-text-secondary);
        margin-bottom: 4px;
    }

    .summary-value {
        font-size: 22px;
        font-weight: 500;
        color: var(--color-text-primary);
    }

    .summary-sub {
        font-size: 11px;
        color: var(--color-text-secondary);
        margin-top: 2px;
    }

    .overall-progress {
        margin-bottom: 1.5rem;
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);

        align-items: center;
        margin-bottom: 8px;

        font-size: 13px;

    }

    .progress-pct {

        font-weight: 500;
        color: var(--color-text-primary);
    }

    .progress-track {
        height: 6px;

        border-radius: 99px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background: #2D6CFF;

        transition: width 0.4s ease;
    }

    .phases {
        display: flex;
        flex-direction: column;
        gap: 12px;

    .phase-card {
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);
        overflow: hidden;

    .phase-header {

        align-items: center;
        gap: 12px;
        padding: 14px 16px;

    .phase-header:hover {
        background: var(--color-background-secondary);
    }

    .phase-num {

    .phase-meta {

    .phase-progress-text {

    let activeFilter = 'all';

    function getTagsForFilter(filter) {
        if (filter === 'all') return null;
        if (filter === 'done') return 'done';
        if (filter === 'todo') return 'todo';
        return filter;
    }

    function taskMatchesFilter(task, filter) {
        if (filter === 'all') return true;
        if (filter === 'done') return task.done;
        if (filter === 'todo') return !task.done;
        return task.tags.includes(filter);
    }

    function toggleTask(taskId) {
        for (const phase of phases) {
            const task = phase.tasks.find(t => t.id === taskId);
            if (task) {
                task.done = !task.done;
                break;
            }
        }
        render();
    }

    function togglePhase(phaseId) {
        if (openPhases.has(phaseId)) {
            openPhases.delete(phaseId);
        } else {
            openPhases.add(phaseId);
        }
        render();
    }

    function setFilter(filter, btn) {
        activeFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function getTotals() {
        let total = 0, done = 0;
        for (const phase of phases) {
            for (const task of phase.tasks) {
                total++;
                if (task.done) done++;
            }
        }
        return { total, done };
    }

    function getPhaseTotals(phase) {
        const total = phase.tasks.length;
        const done = phase.tasks.filter(t => t.done).length;
        return { total, done };
    }

    function render() {
        const { total, done } = getTotals();
        const pct = total === 0 ? 0 : Math.round((done / total) * 100);

        document.getElementById('overall-pct').textContent = pct + '%';
        document.getElementById('overall-bar').style.width = pct + '%';

        const activeTasks = phases.reduce((sum, p) => {
            return sum + p.tasks.filter(t => !t.done).length;
        }, 0);

        const activePhases = phases.filter(p => p.status === 'active').length;

        document.getElementById('summary-cards').innerHTML = `
    <div class="summary-card">
      <div class="summary-label">Tasks done</div>
      <div class="summary-value">${done}</div>
      <div class="summary-sub">of ${total} total</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Remaining</div>
      <div class="summary-value">${total - done}</div>
      <div class="summary-sub">tasks to complete</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Phases</div>
      <div class="summary-value">${phases.length}</div>
      <div class="summary-sub">${activePhases} active now</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Completion</div>
      <div class="summary-value">${pct}%</div>
      <div class="summary-sub">overall progress</div>
    </div>
  `;

        const container = document.getElementById('phases-container');
        container.innerHTML = '';

        for (const phase of phases) {
            const filteredTasks = phase.tasks.filter(t => taskMatchesFilter(t, activeFilter));
            if (filteredTasks.length === 0) continue;

            const { total: pt, done: pd } = getPhaseTotals(phase);
            const ppct = pt === 0 ? 0 : Math.round((pd / pt) * 100);
            const isOpen = openPhases.has(phase.id);

            const statusMap = {
                done: ['Done', 'status-done'],
                active: ['In progress', 'status-active'],
                upcoming: ['Upcoming', 'status-upcoming'],
            };
            const [statusText, statusClass] = statusMap[phase.status] || ['Upcoming', 'status-upcoming'];

            const card = document.createElement('div');
            card.className = 'phase-card';
            card.innerHTML = `
      <div class="phase-header" onclick="togglePhase(${phase.id})">
        <div class="phase-num" style="background: ${phase.bgColor}; color: ${phase.color};">${phase.id}</div>
        <div class="phase-info">
          <div class="phase-name">${phase.name}</div>
          <div class="phase-meta">${phase.timeline}</div>
        </div>
        <div class="phase-right">
          <span class="status-badge ${statusClass}">${statusText}</span>
          <span class="phase-progress-text">${pd}/${pt}</span>
          <div class="phase-mini-bar">
            <div class="phase-mini-fill" style="width: ${ppct}%; background: ${phase.color};"></div>
          </div>
          <span class="chevron ${isOpen ? 'open' : ''}">▼</span>
        </div>
      </div>
      <div class="phase-tasks ${isOpen ? 'open' : ''}">
        ${filteredTasks.map(task => `
          <div class="task-row" onclick="toggleTask('${task.id}')">
            <div class="task-check ${task.done ? 'done' : ''}"></div>
            <div class="task-body">
              <div class="task-name ${task.done ? 'done' : ''}">${task.name}</div>
              <div class="task-tags">
                ${task.tags.map(tag => `<span class="tag tag-${tag}">${tag}</span>`).join('')}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
            container.appendChild(card);
        }
    }

    render();
</script>
